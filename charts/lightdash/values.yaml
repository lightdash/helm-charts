## @section Global Parameters

## @param global.imageRegistry Global Docker image registry
## @param global.storageClass Global StorageClass for Persistent Volume(s)
##
global:
  imageRegistry: ""
  storageClass: ""

## @section Common Parameters

## @param nameOverride String to partially override airbyte.fullname template with a string (will prepend the release name)
##
nameOverride: ""
## @param fullnameOverride String to fully override airbyte.fullname template with a string
##
fullnameOverride: ""

configMap:
  # -- Secure Cookies
  SECURE_COOKIES: "false"
  # -- Trust the reverse proxy when setting secure cookies (via the "X-Forwarded-Proto" header)
  TRUST_PROXY: "false"
  # -- Port for lightdash
  PORT: "8080"
  # -- Path to your local dbt project. Only set this value if you are mounting a DBT project
  DBT_PROJECT_DIR: ""
  # -- Public URL of your instance including protocol e.g. https://lightdash.myorg.com
  SITE_URL: ""

secrets:
  # -- 	This is the secret used to sign the session ID cookie and to encrypt sensitive information. Do not share this secret!
  LIGHTDASH_SECRET: changeme

extraEnv: []
# extraEnv:
#   - name: LIGHTDASH_SECRET
#     valueFrom:
#       secretKeyRef:
#         name: lightdash
#         key: LIGHTDASH_SECRET
schedulerExtraEnv: []

# -- Specify the number of lightdash instances.
replicaCount: 1

image:
  repository: lightdash/lightdash
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

podAnnotations: {}

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 50%

nodeSelector: {}

tolerations: []

## Custom affinity configuration for the deployment
affinity: {}

## Managed by helm chart Pod Anti-Affinity configuration for high availability
## Ensures pods are spread across nodes and zones to prevent downtime during node maintenance
## @param podAntiAffinity.enabled -- Enable pod anti-affinity rules for backend and worker deployments
## @param podAntiAffinity.node -- Node-level anti-affinity: "hard" (required), "soft" (preferred), or "none"
## @param podAntiAffinity.zone -- Zone-level anti-affinity: "hard" (required), "soft" (preferred), or "none"
podAntiAffinity:
  enabled: false
  node: hard
  zone: soft

# Overrides for deployment DNS configuration
# dnsPolicy: ClusterFirst
# dnsConfig:
#   options:
#     - name: ndots
#       value: "1"

## Browserless Chrome chart configuration
## ref: https://github.com/sagikazarmark/helm-charts/tree/master/charts/browserless-chrome
## @param browserless-chrome.enabled default true - whether to enable headless browser
## @param browserless-chrome.replicaCount total replicas
## @param browserless-chrome.resources custom limits and requests for resources
## @param browserless-chrome.image.tag override appVersion in chart
## @param browserless-chrome.image.port override default port of service
browserless-chrome:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "512Mi"
      cpu: "500m"
  image:
    repository: "ghcr.io/browserless/chromium"
    tag: "v2.38.2"
  service:
    port: 80
  env:
    CONNECTION_TIMEOUT: "180000"

## NATS chart configuration (per-release dependency)
## ref: https://github.com/nats-io/k8s/tree/main/helm/charts/nats
## @param nats.enabled Enable or disable the NATS subchart
## @param nats.config.cluster.enabled Enable NATS clustering (required for replicated JetStream)
## @param nats.config.cluster.replicas Number of NATS replicas
## @param nats.config.jetstream.enabled Enable JetStream
## @param nats.config.jetstream.fileStore.enabled Disable file store when using memory mode
## @param nats.config.jetstream.memoryStore.enabled Enable memory-mode JetStream storage
## @param nats.config.jetstream.memoryStore.maxSize Maximum memory store size
## @param nats.container.resources NATS resource requests/limits
nats:
  enabled: false
  config:
    cluster:
      enabled: true
      replicas: 3
    jetstream:
      enabled: true
      fileStore:
        enabled: false
      memoryStore:
        enabled: true
        maxSize: 1Gi
  container:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

## JetStream bootstrap and app configuration
## @param natsJetstream.enabled Enable Lightdash NATS JetStream integration
## @param natsJetstream.connection.url Explicit NATS URL. When empty with nats.enabled=true, local service URL is computed
## @param natsJetstream.connection.user Static NATS username to write into chart-managed secret
## @param natsJetstream.connection.password Static NATS password to write into chart-managed secret
## @param natsJetstream.connection.token Static NATS token to write into chart-managed secret
## @param natsJetstream.connection.existingSecret Existing secret containing NATS auth keys
## @param natsJetstream.connection.secretKeys.user Secret key for username
## @param natsJetstream.connection.secretKeys.password Secret key for password
## @param natsJetstream.connection.secretKeys.token Secret key for token
## @param natsJetstream.stream.name JetStream stream name
## @param natsJetstream.stream.subjects JetStream subjects attached to the stream
## @param natsJetstream.stream.retention JetStream retention policy
## @param natsJetstream.stream.replicas JetStream stream replicas
## @param natsJetstream.consumer.durableName JetStream durable consumer name
## @param natsJetstream.consumer.filterSubject Consumer filter subject
## @param natsJetstream.consumer.ackWait Consumer ack wait duration
## @param natsJetstream.consumer.maxDeliver Consumer max redelivery attempts
## @param natsJetstream.consumer.maxAckPending Consumer max in-flight unacked messages
## @param natsJetstream.app.customerId Customer identifier for app durable naming. Defaults to Helm release name when empty
## @param natsJetstream.app.warehouseStreamName Warehouse query stream name exposed to the app
## @param natsJetstream.app.preAggregateStreamName Pre-aggregate query stream name exposed to the app
## @param natsJetstream.bootstrap.enabled Enable bootstrap Job creation/update for stream and consumer
## @param natsJetstream.bootstrap.image Bootstrap job image
## @param natsJetstream.bootstrap.backoffLimit Bootstrap job backoff limit
## @param natsJetstream.bootstrap.hook.enabled Run bootstrap as Helm post-install/post-upgrade hook
## @param natsJetstream.bootstrap.hook.deletePolicy Helm hook delete policy
natsJetstream:
  enabled: false
  connection:
    url: ""
    user: ""
    password: ""
    token: ""
    existingSecret: ""
    secretKeys:
      user: "user"
      password: "password"
      token: "token"
  stream:
    name: "QUERY_JOBS"
    subjects:
      - "query.jobs"
    retention: "workqueue"
    replicas: 3
  consumer:
    durableName: "async-query-workers"
    filterSubject: "query.jobs"
    ackWait: "30s"
    maxDeliver: 5
    maxAckPending: 50
  app:
    customerId: ""
    warehouseStreamName: "QUERY_JOBS"
    preAggregateStreamName: "QUERY_JOBS"
  bootstrap:
    enabled: true
    image: "natsio/nats-box:latest"
    backoffLimit: 3
    hook:
      enabled: true
      deletePolicy: "before-hook-creation,hook-succeeded"
## @section Lightdash Database parameters

## PostgreSQL chart configuration
## ref: https://github.com/bitnami/charts/blob/master/bitnami/postgresql/values.yaml
## @param postgresql.enabled Switch to enable or disable the PostgreSQL helm chart (i.e. deploy postgres in k8s)
## @param postgresql.image.registry Docker registry for PostgreSQL image
## @param postgresql.image.repository PostgreSQL image repository (defaults to pgvector/pgvector for vector extension support)
## @param postgresql.image.tag PostgreSQL image tag
## @param postgresql.auth.username Lightdash Postgresql username (creates non-admin user)
## @param postgresql.auth.password Lightdash Postgresql password (creates non-admin user)
## @param postgresql.auth.database Lightdash Postgresql database (creates new database)
## @param postgresql.auth.existingSecret An existing secret to use for the postgres password
## @param postgresql.auth.secretKeys.userPasswordKey Key  in the existingSecret to use for the postgres password
## @param postgresql.commonAnnotations.helm.sh/hook It will determine when the hook should be rendered
## @param postgresql.commonAnnotations.helm.sh/hook-weight The order in which the hooks are executed. If weight is lower, it has higher priority
##
postgresql:
  enabled: true
  ## Use pgvector image to support vector extension required for embedding functionality
  image:
    registry: docker.io
    repository: pgvector/pgvector
    tag: pg16
  ## with Postgres 10 helm chart, user "postgres" has superuser privileges (fixing lightdash uuid)
  auth:
    username: lightdash
    password: ""
    database: lightdash
    existingSecret: ""
    secretKeys:
      userPasswordKey: "password"
  commonAnnotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-1"
## External PostgreSQL configuration
## All of these values are only used when postgresql.enabled is set to false
## @param externalDatabase.host Database host
## @param externalDatabase.user non-root Username for Lightdash Database
## @param externalDatabase.password Database password
## @param externalDatabase.existingSecret Name of an existing secret resource containing the DB password. If not set a secret will be created from the value in externalDatabase.password
## @param externalDatabase.secretKeys.passwordKey (only used when externalDatabase.existingSecret is set) Key in the existing secret resource containing the DB password
## @param externalDatabase.database Database name
## @param externalDatabase.port Database port number
##
externalDatabase:
  host: localhost
  user: lightdash
  password: ""
  existingSecret: ""
  secretKeys:
    passwordKey: "postgresql-password"
  database: lightdash
  port: 5432

## SSL configuration
## @param ssl.enabled Enable SSL/TLS for the Lightdash Database connection
## @param ssl.mountPath Path to mount the SSL certificate
## @param ssl.certFileName Name of the certificate file
ssl:
  enabled: false
  mountPath: "/etc/ssl/certs"
  certFileName: ""
  configMapName: ""

## @param additional main containers for the backend and worker deployments
extraContainers: []

## @param initContainers for the backend and worker deployments- these can be normal initContainers or side containers are just init containers with Always restart policy - docs: https://kubernetes.io/docs/concepts/workloads/pods/sidecar-containers/
initContainers: []

## @param additional k8s manifests to deploy with the helm chart
extraObjects: []

## Create service account for workload identity
## @param serviceAccount.create create a service account for workload identity
## @param serviceAccount.name name for the created service account
## @param serviceAccount.annotations
serviceAccount:
  create: true
  name: ""
  annotations: {}

## Customise backend configuration for GCP
backendConfig:
  create: false

## Backend deployment specific configuration
lightdashBackend:
  terminationGracePeriodSeconds: 90
  ## In some older Kubernetes versions, the initialDelaySeconds might be ignored if periodSeconds was set to a value higher than initialDelaySeconds.
  ## However, in current versions, initialDelaySeconds is always honored and the probe will not start until after this initial delay.
  ## https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes
  startupProbe:
    ## 5 + (10 * 18) = ~185s max startup
    initialDelaySeconds: 5
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 18
  livenessProbe:
    ## 5 + (15 * 6) = ~95s to restart
    initialDelaySeconds: 5
    timeoutSeconds: 15
    periodSeconds: 15
    failureThreshold: 6
  readinessProbe:
    ## 5 + (5 * 2) = ~15s to remove from LB
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 5
    failureThreshold: 2
  extraVolumeMounts: []
  extraVolumes: []

## Scheduler deployment specific configuration
scheduler:
  port: 8080
  enabled: false
  replicas: 1
  concurrency: 3
  db:
    maxConnections:
  resources:
    requests:
      memory: 725Mi
      cpu: 475m
      ephemeral-storage: 1Gi
  terminationGracePeriodSeconds: 90
  ## In some older Kubernetes versions, the initialDelaySeconds might be ignored if periodSeconds was set to a value higher than initialDelaySeconds.
  ## However, in current versions, initialDelaySeconds is always honored and the probe will not start until after this initial delay.
  ## https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes
  startupProbe:
    ## 5 + (10 * 18) = ~185s max startup
    initialDelaySeconds: 5
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 18
  livenessProbe:
    ## 5 + (15 * 20) = ~305s to restart
    initialDelaySeconds: 5
    timeoutSeconds: 15
    periodSeconds: 15
    failureThreshold: 20
  readinessProbe:
    ## 5 + (5 * 2) = ~15s to remove from LB
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 5
    failureThreshold: 2
  tasks:
    exclude:
    include:
  extraVolumeMounts: []
  extraVolumes: []
